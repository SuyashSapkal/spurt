name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute SHA256
        id: sha
        run: |
          curl -sL "https://github.com/SuyashSapkal/spurt/releases/download/${GITHUB_REF_NAME}/spurt-cli-macos.zip" -o macos.zip
          curl -sL "https://github.com/SuyashSapkal/spurt/releases/download/${GITHUB_REF_NAME}/spurt-cli-linux.zip" -o linux.zip

          echo "macos_sha=$(sha256sum macos.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$(sha256sum linux.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-spurt tap repo
        uses: actions/checkout@v4
        with:
          repository: SuyashSapkal/homebrew-spurt
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          MACOS_SHA: ${{ steps.sha.outputs.macos_sha }}
          LINUX_SHA: ${{ steps.sha.outputs.linux_sha }}
        run: |
          cat > Formula/spurt.rb << 'FORMULA'
          class Spurt < Formula
            desc "Push-to-talk dictation powered by whisper.cpp"
            homepage "https://github.com/SuyashSapkal/spurt"
            version "PLACEHOLDER_VERSION"
            license "BSD-2-Clause"

            on_macos do
              url "https://github.com/SuyashSapkal/spurt/releases/download/PLACEHOLDER_TAG/spurt-cli-macos.zip"
              sha256 "PLACEHOLDER_MACOS_SHA"
            end

            on_linux do
              url "https://github.com/SuyashSapkal/spurt/releases/download/PLACEHOLDER_TAG/spurt-cli-linux.zip"
              sha256 "PLACEHOLDER_LINUX_SHA"
            end

            def install
              bin.install "spurt-cli" => "spurt"
            end

            test do
              assert_match "spurt PLACEHOLDER_VERSION", shell_output("#{bin}/spurt --version")
            end
          end
          FORMULA

          sed -i "s/PLACEHOLDER_VERSION/${VERSION}/g" Formula/spurt.rb
          sed -i "s/PLACEHOLDER_TAG/${TAG}/g" Formula/spurt.rb
          sed -i "s/PLACEHOLDER_MACOS_SHA/${MACOS_SHA}/g" Formula/spurt.rb
          sed -i "s/PLACEHOLDER_LINUX_SHA/${LINUX_SHA}/g" Formula/spurt.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spurt.rb
          git commit -m "Update spurt to ${{ steps.version.outputs.version }}"
          git push
